<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fieldmark Support</title>
    <meta name="description" content="Support contact information for Fieldmark.">
    <style>
      body {
        margin: 0;
        background: #f7faf5;
        color: #14231b;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.6;
      }

      main {
        width: min(760px, calc(100% - 40px));
        margin: 0 auto;

        border: 1px solid #dbe4d6;

      }

      a {
        color: #24583d;
        font-weight: 700;
      }

      footer {

        color: #5d6b61;

  <body>
    <main>
      <h1>Fieldmark Support</h1>
      <p>Need help with Fieldmark or have a question about the app?</p>

      <div class="panel">
        <p>Email support at <a href="mailto:furly.help.master@gmail.com">furly.help.master@gmail.com</a>.</p>
        <p>Please include your device model, iOS version, app version, and a short description of the issue.</p>
      </div>

      <footer>
